name: Deploy to Firebase Hosting on PR
on: pull_request
permissions:
  checks: write
  contents: read
  pull-requests: write
jobs:
  build_and_preview:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run build
        env:
          BUN_PUBLIC_FIREBASE_API_KEY: ${{ secrets.BUN_PUBLIC_FIREBASE_API_KEY }}
          BUN_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.BUN_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          BUN_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.BUN_PUBLIC_FIREBASE_PROJECT_ID }}
          BUN_PUBLIC_FIREBASE_APP_ID: ${{ secrets.BUN_PUBLIC_FIREBASE_APP_ID }}
          BUN_PUBLIC_FIREBASE_MEASUREMENT_ID: ${{ secrets.BUN_PUBLIC_FIREBASE_MEASUREMENT_ID }}
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_PROMDEMIC2026 }}
          projectId: promdemic2026
