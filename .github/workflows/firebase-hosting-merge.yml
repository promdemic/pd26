name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run build
        env:
          BUN_PUBLIC_FIREBASE_API_KEY: ${{ secrets.BUN_PUBLIC_FIREBASE_API_KEY }}
          BUN_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.BUN_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          BUN_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.BUN_PUBLIC_FIREBASE_PROJECT_ID }}
          BUN_PUBLIC_FIREBASE_APP_ID: ${{ secrets.BUN_PUBLIC_FIREBASE_APP_ID }}
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_PROMDEMIC2026 }}
          channelId: live
          projectId: promdemic2026
